apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  replicas: 5 #chạy 5 pod api

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api
        owner: phuong
    spec:
      containers:
      - name: api
        image: ghcr.io/tieuphuong1711/w10-api:v2
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
          protocol: TCP

        env:
        - name: VERSION
          value: "v2"
        - name: ERROR_RATE
          value: "0"

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3

        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 200m
            memory: 128Mi

  strategy:
    canary:
      steps:
      - setWeight: 10
      - pause:
          duration: 2m
      - setWeight: 50
      - pause:
          duration: 2m
      - setWeight: 100