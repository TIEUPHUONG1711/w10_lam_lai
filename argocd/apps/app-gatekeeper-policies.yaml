apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: gatekeeper-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  project: default

  source:
    repoURL: https://github.com/TIEUPHUONG1711/w10_lam_lai.git
    targetRevision: main
    path: gatekeeper
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true


