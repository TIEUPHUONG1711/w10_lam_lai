apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: common
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: "-1"

spec:
  project: default

  source:
    repoURL: https://github.com/TIEUPHUONG1711/w10_lam_lai.git
    targetRevision: main
    path: app-common

  destination: #deploy app-common vào cluster hiện tại, namespace demo
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true