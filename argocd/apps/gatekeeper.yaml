apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.16.3
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

#OPA là policy engine có nhiệm vụ đọc policy và đánh giá policy, opa dùng ngôn ngữ : rego
#vì opa ko tích hợp trực tiếp với k8s nên cần gatekeeper để làm cầu nối giữa opa và k8s

# Flow đúng là:

# Bạn viết policy
# ↓
# ConstraintTemplate
# ↓
# Constraint
# ↓
# Gatekeeper
# ↓
# Kubernetes Admission Controller
# ↓
# Allow / Deny resource

# Trong đó:

# ConstraintTemplate
# = định nghĩa luật kiểm tra là gì

# Constraint
# = áp dụng luật đó ở đâu, enforce kiểu gì

# Gatekeeper
# = controller/webhook kết nối policy với Kubernetes

# Kubernetes
# = trước khi tạo resource sẽ hỏi Gatekeeper