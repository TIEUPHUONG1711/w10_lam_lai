name: validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-yaml:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install kubeconform
      run: |
        curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
        tar xf kubeconform.tar.gz
        sudo mv kubeconform /usr/local/bin/kubeconform

    - name: Validate Kubernetes manifests
      run: |
        kubeconform \
          -summary \
          -ignore-missing-schemas \
          app-common app-api app-analysis app-alert rbac gatekeeper argocd


#code này để validate các file yaml trong repo, đảm bảo chúng là các manifest hợp lệ của Kubernetes.          

