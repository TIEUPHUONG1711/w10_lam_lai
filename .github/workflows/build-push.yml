name: Build Push

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest

    env:
      IMAGE: ghcr.io/tieuphuong1711/w10-api

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Image
      run: |
        docker build \
          -t $IMAGE:${{ github.sha }} \
          -t $IMAGE:v2 \
          ./src/api

    - name: Push SHA Tag
      run: |
        docker push $IMAGE:${{ github.sha }}

    - name: Push Stable Tag
      run: |
        docker push $IMAGE:v2

    - name: Update Rollout Image
      run: |
        sed -i "s|image: .*|image: $IMAGE:v2|g" app-api/rollout.yaml

    - name: Commit Manifest
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com

        git add app-api/rollout.yaml

        git diff --cached --quiet || \
        git commit -m "update image"

        git push